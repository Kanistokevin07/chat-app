services:

  postgres:
    image: postgres:16-alpine
    container_name: chat-postgres

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
      POSTGRES_DB: chatdb

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data


  redis:
    image: redis:7-alpine
    container_name: chat-redis

    ports:
      - "6379:6379"


volumes:

  postgres_data: